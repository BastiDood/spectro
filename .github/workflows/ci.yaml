name: Code Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main

jobs:
  build:
    name: Build SvelteKit
    runs-on: ubuntu-latest
    env:
      PUBLIC_ORIGIN: https://example.com
      SPECTRO_DATABASE_DRIVER: pg
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Dependencies
        run: pnpm install
      - name: Check Formatters
        run: pnpm fmt
      - name: Synchronize SvelteKit
        run: pnpm sync
      - name: Run All Lints in Parallel
        run: pnpm lint
      - name: Run Unit Tests
        run: pnpm test
      - name: Build Website with PostgreSQL
        run: pnpm build
      - name: Build Website with Neon
        env:
          SPECTRO_DATABASE_DRIVER: neon
        run: pnpm build
