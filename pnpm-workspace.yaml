blockExoticSubdeps: true

engineStrict: true

minimumReleaseAge: 1440 # 1 Day

minimumReleaseAgeExclude:
  - '@sveltejs/kit@2.49.5'
  - devalue@5.6.2
  - pg@8.17.1

onlyBuiltDependencies:
  - esbuild
  - protobufjs

patchedDependencies:
  '@inngest/ai': patches/@inngest__ai.patch
  '@neondatabase/serverless': patches/@neondatabase__serverless.patch

strictDepBuilds: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - ts-api-utils@2.3.0
  - undici-types@6.21.0
